name: Quarterly Feedback Collection

# Edge 6 (VII→I): Collects distribution reports and analytics from the
# quarter, then creates a synthesis-needed issue. A human writes the
# synthesis; labeling it 'synthesis-complete' triggers the dispatch
# workflow (quarterly-synthesis-dispatch.yml).

on:
  schedule:
    # 1st Monday of Jan, Apr, Jul, Oct at 10:00 UTC
    - cron: '0 10 1-7 1,4,7,10 1'
  workflow_dispatch:

jobs:
  collect-signals:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/announcement-templates.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/social-automation.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/distribution-strategy.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/kerygma-pipeline.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/kerygma-profiles.git"
          pip install pyyaml feedparser

      - name: Collect quarterly signals
        id: signals
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'QUARTERLY_SIGNALS'
          import json
          import os
          import subprocess
          import sys
          import textwrap
          from datetime import datetime, timedelta, timezone

          def gh_api(endpoint):
              result = subprocess.run(
                  ['gh', 'api', endpoint],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  return None
              try:
                  return json.loads(result.stdout)
              except json.JSONDecodeError:
                  return None

          now = datetime.now(timezone.utc)
          quarter_start = now.replace(
              month=((now.month - 1) // 3) * 3 + 1,
              day=1, hour=0, minute=0, second=0, microsecond=0
          )
          since = quarter_start.isoformat()
          quarter_label = f"Q{(now.month - 1) // 3 + 1} {now.year}"

          # Collect distribution reports from this quarter
          reports = gh_api(
              f'repos/organvm-vii-kerygma/.github/issues'
              f'?labels=distribution-report&state=all&since={since}&per_page=100'
          ) or []

          # Collect analytics reports
          analytics = gh_api(
              f'repos/organvm-vii-kerygma/.github/issues'
              f'?labels=analytics-report&state=all&since={since}&per_page=100'
          ) or []

          dist_count = len(reports)
          analytics_count = len(analytics)

          # Extract event types from distribution reports
          event_types = {}
          for report in reports:
              title = report.get('title', '')
              if '[Distribution]' in title:
                  parts = title.split('\u2014')
                  if len(parts) >= 1:
                      etype = parts[0].replace('[Distribution]', '').strip()
                      event_types[etype] = event_types.get(etype, 0) + 1

          event_summary = '\n'.join(
              f'| `{etype}` | {count} |'
              for etype, count in sorted(event_types.items(), key=lambda x: -x[1])
          ) or '| (none) | 0 |'

          body = textwrap.dedent(f"""\
          ## Quarterly Feedback Signals \u2014 {quarter_label}

          **Period:** {quarter_start.strftime('%Y-%m-%d')} to {now.strftime('%Y-%m-%d')}

          ### Distribution Activity

          | Metric | Value |
          |--------|-------|
          | Distribution reports | {dist_count} |
          | Analytics reports | {analytics_count} |

          ### Event Type Breakdown

          | Event Type | Count |
          |------------|-------|
          {event_summary}

          ### Synthesis Instructions

          Review the distribution data above and write a synthesis addressing:

          1. **What content performed well** \u2014 which event types generated the most engagement?
          2. **Distribution gaps** \u2014 are there organs or content types not being distributed?
          3. **Recommendations for ORGAN-I** \u2014 what theoretical directions should be explored based on audience signals?
          4. **Pipeline health** \u2014 any recurring failures or bottlenecks?

          When synthesis is complete, apply the `synthesis-complete` label to trigger dispatch to ORGAN-IV \u2192 ORGAN-I.

          ---
          *Generated by quarterly-feedback.yml (Edge 6: VII\u2192I)*
          """)

          with open('quarterly-body.md', 'w') as f:
              f.write(body)

          print(f"Quarter: {quarter_label}")
          print(f"Distribution reports: {dist_count}")
          print(f"Analytics reports: {analytics_count}")
          print(f"Event types: {len(event_types)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"quarter_label={quarter_label}\n")

          QUARTERLY_SIGNALS

      - name: Check for existing issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUARTER: ${{ steps.signals.outputs.quarter_label }}
        run: |
          EXISTING=$(gh issue list \
            --search "Quarterly Feedback: ${QUARTER} in:title" \
            --state open --json title --limit 3 2>/dev/null || echo "[]")
          COUNT=$(echo "$EXISTING" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(len([i for i in data if 'Quarterly Feedback' in i.get('title','')]))
          " 2>/dev/null || echo "0")
          echo "exists=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "quarterly-feedback" --color "1D76DB" \
            --description "Quarterly feedback collection for Edge 6" 2>/dev/null || true
          gh label create "synthesis-needed" --color "D93F0B" \
            --description "Human synthesis required" 2>/dev/null || true
          gh label create "synthesis-complete" --color "0E8A16" \
            --description "Synthesis done - ready for dispatch" 2>/dev/null || true

      - name: Create quarterly issue
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUARTER: ${{ steps.signals.outputs.quarter_label }}
        run: |
          gh issue create \
            --title "Quarterly Feedback: ${QUARTER}" \
            --body-file quarterly-body.md \
            --label "quarterly-feedback" \
            --label "synthesis-needed" \
            || echo "Issue creation failed"

name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "kerygma_pipeline.py"
      - "scripts/**"
      - "tests/**"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/announcement-templates.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/social-automation.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/distribution-strategy.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/kerygma-pipeline.git"
          pip install "git+https://${GH_TOKEN}@github.com/organvm-vii-kerygma/kerygma-profiles.git"
          pip install pyyaml feedparser pytest

      - name: Run pipeline tests
        run: pytest tests/ -v

      - name: Verify CLI commands
        run: |
          python kerygma_pipeline.py status
          python kerygma_pipeline.py templates
          python kerygma_pipeline.py activate
          python kerygma_pipeline.py schedule list
          python kerygma_pipeline.py report --period weekly

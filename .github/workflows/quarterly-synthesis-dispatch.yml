name: Quarterly Synthesis Dispatch

# Edge 6 (VII→I): When a quarterly feedback issue is labeled
# 'synthesis-complete', dispatches marketing.quarterly-signals to
# ORGAN-IV, which creates a theory-input issue in ORGAN-I.

on:
  issues:
    types: [labeled]

jobs:
  dispatch-synthesis:
    if: github.event.label.name == 'synthesis-complete'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate quarterly-feedback label
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_FULL: ${{ github.repository }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUM" --repo "$REPO_FULL" \
            --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          QF_OK=$(echo "$LABELS" | grep -c "quarterly-feedback" || true)
          if [ "$QF_OK" -ge 1 ]; then
            echo "is_quarterly=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_quarterly=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract synthesis content
        if: steps.validate.outputs.is_quarterly == 'true'
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO_FULL: ${{ github.repository }}
        run: |
          BODY=$(gh issue view "$ISSUE_NUM" --repo "$REPO_FULL" \
            --json body --jq '.body' 2>/dev/null || echo "")
          TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO_FULL" \
            --json title --jq '.title' 2>/dev/null || echo "")

          QUARTER=${TITLE#Quarterly Feedback: }
          echo "quarter=${QUARTER}" >> "$GITHUB_OUTPUT"

          echo "$BODY" > synthesis_body.txt

      - name: Dispatch marketing.quarterly-signals
        if: steps.validate.outputs.is_quarterly == 'true'
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRATION_PAT || secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          QUARTER: ${{ steps.extract.outputs.quarter }}
        run: |
          PAYLOAD=$(python3 -c "
          import json, os
          with open('synthesis_body.txt') as f:
              body = f.read()[:3000]
          print(json.dumps({
              'source_repo': os.environ['REPO_FULL'],
              'source_organ': 'ORGAN-VII',
              'target_organ': 'ORGAN-I',
              'quarter': os.environ['QUARTER'],
              'issue_number': os.environ['ISSUE_NUM'],
              'issue_title': os.environ['ISSUE_TITLE'],
              'synthesis_excerpt': body,
              'triggered_by': 'quarterly-synthesis-dispatch',
          }))
          ")

          gh api repos/organvm-iv-taxis/orchestration-start-here/dispatches \
            --method POST \
            -f event_type=marketing.quarterly-signals \
            -f "client_payload=${PAYLOAD}"

          echo "Dispatched marketing.quarterly-signals to ORGAN-IV"

      - name: Comment confirmation
        if: steps.validate.outputs.is_quarterly == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Quarterly synthesis dispatched to ORGAN-IV.**\n\nThe `marketing.quarterly-signals` event has been sent to the orchestration hub. ORGAN-IV will create a theory-input issue in ORGAN-I.\n\n---\n*Generated by quarterly-synthesis-dispatch.yml (Edge 6: VII→I)*'
            });

      - name: Comment not-quarterly
        if: steps.validate.outputs.is_quarterly == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Synthesis dispatch skipped.** This issue does not have the `quarterly-feedback` label.\n\nRemove `synthesis-complete` and re-apply only on quarterly feedback issues.\n\n---\n*Generated by quarterly-synthesis-dispatch.yml*'
            });
